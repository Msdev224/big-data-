name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
          pip install -r requirements.txt \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.10.5/constraints-3.11.txt"

      - name: Ruff lint
        run: ruff check app airflow/dags tests

      - name: Pytest
        env:
          AIRFLOW__CORE__LOAD_EXAMPLES: "False"
          AIRFLOW__CORE__UNIT_TEST_MODE: "True"
        run: pytest

  dbt-parse:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dbt
        run: |
          python -m pip install --upgrade pip
          pip install "dbt-core==1.9.2" "dbt-snowflake==1.9.0"

      - name: dbt deps & parse
        working-directory: app/dbt_bookshop
        env:
          SNOWFLAKE_ACCOUNT: dummy
          SNOWFLAKE_USER: dummy
          SNOWFLAKE_PASSWORD: dummy
          SNOWFLAKE_ROLE: ACCOUNTADMIN
          SNOWFLAKE_WAREHOUSE: COMPUTE_WH
          SNOWFLAKE_DATABASE: BOOKSHOP
          SNOWFLAKE_SCHEMA: RAW
        run: |
          cp profiles.yml.example profiles.yml
          dbt deps --profiles-dir . || true
          dbt parse --profiles-dir .
